<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stack Tower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{
            width:100%;height:100%;overflow:hidden;
            background:#08080f;
            font-family:'Outfit',sans-serif;
            touch-action:none;
            -webkit-user-select:none;user-select:none;
        }
        canvas{display:block;width:100%;height:100%}

        /* Skor */
        #score-display{
            position:fixed;top:44px;left:50%;
            transform:translateX(-50%) scale(1);
            font-size:clamp(56px,14vw,88px);font-weight:900;
            color:#fff;z-index:10;pointer-events:none;
            opacity:0;transition:opacity .4s,transform .12s ease-out;
            text-shadow:0 2px 24px rgba(0,0,0,.6);
            letter-spacing:-4px;line-height:1;
        }
        #score-display.visible{opacity:1}
        #score-display.pulse{transform:translateX(-50%) scale(1.18)}

        /* Combo */
        #combo-display{
            position:fixed;top:clamp(100px,14vw,140px);left:50%;
            transform:translateX(-50%) translateY(6px);
            font-size:18px;font-weight:700;letter-spacing:5px;
            text-transform:uppercase;z-index:10;pointer-events:none;
            opacity:0;transition:opacity .3s,transform .3s;
            color:#ffd700;text-shadow:0 0 18px rgba(255,215,0,.55);
        }
        #combo-display.visible{opacity:1;transform:translateX(-50%) translateY(0)}

        /* Overlay screens */
        .ov{
            position:fixed;inset:0;display:flex;flex-direction:column;
            align-items:center;justify-content:center;z-index:20;
            opacity:1;transition:opacity .5s ease;
        }
        .ov.hidden{opacity:0;pointer-events:none}

        #start-screen{background:rgba(8,8,15,.93)}
        #start-screen .t{
            font-size:clamp(52px,13vw,78px);font-weight:900;
            color:#fff;letter-spacing:-3px;margin-bottom:10px;
        }
        #start-screen .t span{
            background:linear-gradient(135deg,#ff6b4a,#ffd700,#4aff8b,#4ac8ff,#b44aff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;
        }
        #start-screen .sub{
            font-size:15px;font-weight:300;color:rgba(255,255,255,.3);
            margin-bottom:44px;letter-spacing:1px;
        }

        #go-screen{background:rgba(8,8,15,.88)}
        #go-screen .go-t{
            font-size:24px;font-weight:700;color:rgba(255,255,255,.4);
            letter-spacing:8px;text-transform:uppercase;margin-bottom:10px;
        }
        #go-screen .fs{
            font-size:clamp(60px,16vw,100px);font-weight:900;
            color:#fff;letter-spacing:-4px;line-height:1;margin-bottom:6px;
        }
        #go-screen .bs{
            font-size:14px;font-weight:300;color:rgba(255,255,255,.28);
            margin-bottom:44px;
        }
        .nb{color:#ffd700;font-weight:600}

        .btn{
            padding:15px 52px;border:2px solid rgba(255,255,255,.2);
            background:transparent;color:#fff;font-family:'Outfit',sans-serif;
            font-size:16px;font-weight:600;letter-spacing:3px;
            border-radius:60px;cursor:pointer;transition:all .25s ease;outline:none;
        }
        .btn:hover,.btn:focus-visible{
            background:#fff;color:#08080f;border-color:#fff;
            box-shadow:0 0 30px rgba(255,255,255,.12);
        }
        .btn:focus-visible{box-shadow:0 0 0 3px rgba(255,255,255,.35)}

        /* Hint ketuk */
        #tap-hint{
            position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
            font-size:13px;font-weight:300;color:rgba(255,255,255,.2);
            z-index:10;pointer-events:none;letter-spacing:2px;
            opacity:0;transition:opacity .5s;
        }
        #tap-hint.visible{opacity:1}

        @media(prefers-reduced-motion:reduce){
            *{transition-duration:.01ms!important;animation-duration:.01ms!important}
        }
    </style>
</head>
<body>

<canvas id="gc"></canvas>

<div id="score-display">0</div>
<div id="combo-display">PERFECT</div>
<div id="tap-hint">KETUK / SPASI</div>

<!-- Layar Mulai -->
<div class="ov" id="start-screen">
    <div class="t"><span>STACK</span></div>
    <div class="sub">Ketuk untuk menumpuk blok setinggi mungkin</div>
    <button class="btn" id="btn-start" aria-label="Mulai permainan">MULAI</button>
</div>

<!-- Layar Game Over -->
<div class="ov hidden" id="go-screen">
    <div class="go-t">Game Over</div>
    <div class="fs" id="fs-val">0</div>
    <div class="bs" id="bs-val">Best: 0</div>
    <button class="btn" id="btn-re" aria-label="Main lagi">LAGI</button>
</div>

<script>
(() => {
    'use strict';

    /* ===== Canvas ===== */
    const cvs = document.getElementById('gc');
    const ctx = cvs.getContext('2d');
    let W, H;

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        cvs.width = W * dpr;
        cvs.height = H * dpr;
        cvs.style.width = W + 'px';
        cvs.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    /* ===== Konstanta ===== */
    const BH       = 26;     // tinggi blok (px)
    const DX       = 13;     // offset isometri X
    const DY       = -8;     // offset isometri Y
    const PERF_T   = 5;      // threshold perfect (px)
    const BASE_SPD = 2.0;    // kecepatan awal
    const SPD_INC  = 0.07;   // kenaikan kecepatan/blok
    const INIT_W   = 160;    // lebar awal
    const GRAV     = 0.32;
    const noMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

    /* ===== State ===== */
    let stack, mov, cuts, sparks, pops, bgDots;
    let score, best, combo, camY, camT, shake, state, isNew;

    best = parseInt(localStorage.getItem('stk_b') || '0');

    /* Titik background */
    bgDots = [];
    for (let i = 0; i < 55; i++) {
        bgDots.push({
            x: Math.random() * 4000, y: Math.random() * 4000,
            r: Math.random() * 1.1 + 0.3,
            sp: Math.random() * 0.22 + 0.04,
            a: Math.random() * 0.2 + 0.04
        });
    }

    /* ===== Warna Blok ===== */
    function bCol(i) {
        const h = (i * 19 + 8) % 360;
        return {
            top:  `hsl(${h},64%,63%)`,
            face: `hsl(${h},64%,47%)`,
            side: `hsl(${h},64%,35%)`,
            glow: `hsla(${h},72%,48%,0.09)`
        };
    }

    /* ===== Init ===== */
    function init() {
        stack = []; cuts = []; sparks = []; pops = [];
        score = 0; combo = 0; camY = 0; camT = 0; shake = 0; isNew = false;

        const bw = INIT_W + 36;
        // Platform dasar (dekoratif)
        stack.push({
            x: W / 2 - bw / 2, y: H - 105,
            w: bw, c: { top:'#16162a', face:'#111122', side:'#0b0b18', glow:'transparent' },
            base: true
        });
        // Blok pertama
        stack.push({
            x: W / 2 - INIT_W / 2, y: H - 105 - BH,
            w: INIT_W, c: bCol(0), base: false
        });

        spawn();
        updUI();
    }

    /* ===== Spawn Blok Bergerak ===== */
    function spawn() {
        const last = stack[stack.length - 1];
        const dir  = stack.length % 2 === 0 ? 1 : -1;
        const spd  = (BASE_SPD + (stack.length - 1) * SPD_INC) * dir;
        mov = {
            x: dir === 1 ? -last.w - 30 : W + 30,
            y: last.y - BH,
            w: last.w, spd, c: bCol(stack.length - 1)
        };
    }

    /* ===== Tempatkan Blok ===== */
    function place() {
        if (!mov || state !== 'play') return;
        const last = stack[stack.length - 1];

        const oL = Math.max(mov.x, last.x);
        const oR = Math.min(mov.x + mov.w, last.x + last.w);
        const ov = oR - oL;

        if (ov <= 0) {
            // Meleset — game over
            cuts.push(mkCut(mov.x, mov.y, mov.w, mov.spd * 0.22, mov.c));
            gameOver(); return;
        }

        const diff = Math.abs(mov.x - last.x);
        const ny   = mov.y;

        if (diff < PERF_T) {
            /* — PERFECT — */
            combo++;
            const bonus = 1 + Math.min(combo, 12);
            stack.push({ x: last.x, y: ny, w: last.w, c: mov.c, base: false });
            score += bonus;
            addPop(last.x + last.w / 2, ny, '+' + bonus, combo > 1);
            if (combo > 1) showCombo(combo);
            if (!noMotion) mkSparks(last.x, ny, last.w, mov.c);
        } else {
            /* — Normal (potong) — */
            combo = 0; hideCombo();

            const nx = oL, nw = ov;
            let cx, cw, cvx;
            if (mov.x < last.x) {
                cx = mov.x; cw = mov.x + mov.w - oL; cvx = -Math.abs(mov.spd) * 0.18;
            } else {
                cx = oR; cw = mov.x + mov.w - oR; cvx = Math.abs(mov.spd) * 0.18;
            }
            if (cw > 0.5) cuts.push(mkCut(cx, ny, cw, cvx, mov.c));

            stack.push({ x: nx, y: ny, w: nw, c: mov.c, base: false });
            score += 1;
            addPop(nx + nw / 2, ny, '+1', false);
        }

        camT += BH;
        updUI();
        spawn();
    }

    function mkCut(x, y, w, vx, c) {
        return { x, y, w, vx, vy: 0, rot: 0, rv: (Math.random()-.5)*.05, c, a: 1 };
    }

    /* ===== Game Over ===== */
    function gameOver() {
        state = 'over'; shake = 12; hideCombo();
        if (score > best) { best = score; localStorage.setItem('stk_b', String(best)); isNew = true; }
        setTimeout(() => {
            document.getElementById('fs-val').textContent = score;
            document.getElementById('bs-val').innerHTML = isNew
                ? '<span class="nb">New Best!</span>'
                : 'Best: ' + best;
            document.getElementById('go-screen').classList.remove('hidden');
            document.getElementById('btn-re').focus();
            document.getElementById('tap-hint').classList.remove('visible');
        }, 650);
    }

    /* ===== Partikel ===== */
    function mkSparks(bx, by, bw, c) {
        const hue = parseFloat(c.top.match(/hsl\((\d+)/)?.[1] || 0);
        const n = noMotion ? 4 : 22;
        for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = Math.random() * 4 + 1.2;
            sparks.push({
                x: bx + Math.random() * bw, y: by + Math.random() * BH * .4,
                vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2,
                life: 1, dec: Math.random() * .016 + .01,
                sz: Math.random() * 3.5 + 1.5, hue
            });
        }
    }

    function addPop(x, y, txt, gold) {
        pops.push({ x, y, txt, gold, life: 1, vy: -1.3 });
    }

    /* ===== UI ===== */
    const sEl = document.getElementById('score-display');
    const cEl = document.getElementById('combo-display');
    const hEl = document.getElementById('tap-hint');

    function updUI() {
        sEl.textContent = score;
        sEl.classList.add('pulse');
        setTimeout(() => sEl.classList.remove('pulse'), 120);
    }
    function showCombo(n) {
        cEl.textContent = 'PERFECT x' + n;
        cEl.classList.add('visible');
    }
    function hideCombo() { cEl.classList.remove('visible'); }

    /* ===== Gambar Blok 3D ===== */
    function drawBox(b, oy) {
        const x = b.x, y = b.y + oy, w = Math.max(b.w, .1), c = b.c;

        // Glow
        if (c.glow && c.glow !== 'transparent') {
            ctx.fillStyle = c.glow;
            ctx.fillRect(x - 3, y - 3, w + DX + 6, BH + Math.abs(DY) + 6);
        }

        // Depan
        ctx.fillStyle = c.face;
        ctx.fillRect(x, y, w, BH);

        // Atas
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + DX, y + DY);
        ctx.lineTo(x + w + DX, y + DY);
        ctx.lineTo(x + w, y);
        ctx.closePath();
        ctx.fillStyle = c.top;
        ctx.fill();

        // Kanan
        ctx.beginPath();
        ctx.moveTo(x + w, y);
        ctx.lineTo(x + w + DX, y + DY);
        ctx.lineTo(x + w + DX, y + BH + DY);
        ctx.lineTo(x + w, y + BH);
        ctx.closePath();
        ctx.fillStyle = c.side;
        ctx.fill();

        // Highlight tepi atas
        if (!b.base) {
            ctx.strokeStyle = 'rgba(255,255,255,.07)';
            ctx.lineWidth = .5;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + w, y);
            ctx.stroke();
        }
    }

    function drawCutPiece(p, oy) {
        const x = p.x, y = p.y + oy, w = Math.max(p.w, .1);
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.a);
        ctx.fillStyle = p.c.face;
        ctx.fillRect(x, y, w, BH);
        ctx.fillStyle = p.c.top;
        ctx.beginPath();
        ctx.moveTo(x,y); ctx.lineTo(x+DX,y+DY);
        ctx.lineTo(x+w+DX,y+DY); ctx.lineTo(x+w,y);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = p.c.side;
        ctx.beginPath();
        ctx.moveTo(x+w,y); ctx.lineTo(x+w+DX,y+DY);
        ctx.lineTo(x+w+DX,y+BH+DY); ctx.lineTo(x+w,y+BH);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }

    /* ===== Update ===== */
    function update() {
        camY += (camT - camY) * .065;
        shake *= .87;
        if (shake < .15) shake = 0;

        // Blok bergerak
        if (mov && state === 'play') {
            mov.x += mov.spd;
            if (mov.spd > 0 && mov.x > W + 30) mov.spd = -Math.abs(mov.spd);
            else if (mov.spd < 0 && mov.x + mov.w < -30) mov.spd = Math.abs(mov.spd);
        }

        // Potongan jatuh
        for (let i = cuts.length - 1; i >= 0; i--) {
            const p = cuts[i];
            p.vy += GRAV; p.x += p.vx; p.y += p.vy;
            p.rot += p.rv; p.a -= .005;
            if (p.a <= 0 || p.y - camY > H + 300) cuts.splice(i, 1);
        }

        // Percikan
        for (let i = sparks.length - 1; i >= 0; i--) {
            const s = sparks[i];
            s.x += s.vx; s.y += s.vy; s.vy += .055;
            s.life -= s.dec;
            if (s.life <= 0) sparks.splice(i, 1);
        }

        // Popup teks
        for (let i = pops.length - 1; i >= 0; i--) {
            const p = pops[i];
            p.y += p.vy; p.life -= .016;
            if (p.life <= 0) pops.splice(i, 1);
        }

        // BG dots
        for (const d of bgDots) {
            d.y -= d.sp;
            if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
        }
    }

    /* ===== Render ===== */
    function render() {
        ctx.clearRect(0, 0, W, H);

        // Background gradient
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#08080f');
        bg.addColorStop(.45, '#0c0c1c');
        bg.addColorStop(1, '#08080f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Dots background
        for (const d of bgDots) {
            ctx.beginPath();
            ctx.arc(d.x % W, d.y, d.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${d.a})`;
            ctx.fill();
        }

        // Kamera + shake
        ctx.save();
        if (shake > 0) {
            ctx.translate(
                (Math.random() - .5) * shake * 2,
                (Math.random() - .5) * shake * 2
            );
        }

        const oy = camY;

        // Gambar semua blok stack (bawah ke atas)
        for (const b of stack) drawBox(b, oy);

        // Blok bergerak
        if (mov && state === 'play') drawBox(mov, oy);

        // Garis pandu halus di atas blok terakhir
        if (mov && state === 'play') {
            const last = stack[stack.length - 1];
            if (!last.base) {
                ctx.strokeStyle = 'rgba(255,255,255,.06)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 6]);
                ctx.beginPath();
                ctx.moveTo(last.x, last.y + oy - 1);
                ctx.lineTo(last.x + last.w, last.y + oy - 1);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Potongan jatuh
        for (const p of cuts) drawCutPiece(p, oy);

        // Percikan
        for (const s of sparks) {
            const r = Math.max(.1, s.sz * s.life);
            ctx.beginPath();
            ctx.arc(s.x, s.y + oy, r, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${s.hue},80%,72%,${s.life * .85})`;
            ctx.fill();
        }

        // Popup skor
        for (const p of pops) {
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.font = p.gold ? 'bold 22px Outfit' : '600 15px Outfit';
            ctx.textAlign = 'center';
            ctx.fillStyle = p.gold ? '#ffd700' : '#ffffff';
            ctx.fillText(p.txt, p.x, p.y + oy);
            ctx.restore();
        }

        ctx.restore();
    }

    /* ===== Loop ===== */
    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }

    /* ===== Input ===== */
    function onInput(e) {
        if (e) e.preventDefault();
        if (state === 'play') place();
    }

    cvs.addEventListener('pointerdown', onInput);
    document.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'Enter') {
            if (state === 'play') { e.preventDefault(); place(); }
            else if (state === 'start') document.getElementById('btn-start').click();
            else if (state === 'over') document.getElementById('btn-re').click();
        }
    });

    /* ===== Tombol ===== */
    document.getElementById('btn-start').addEventListener('click', () => {
        document.getElementById('start-screen').classList.add('hidden');
        sEl.classList.add('visible');
        hEl.classList.add('visible');
        state = 'play';
        init();
    });

    document.getElementById('btn-re').addEventListener('click', () => {
        document.getElementById('go-screen').classList.add('hidden');
        hEl.classList.add('visible');
        state = 'play';
        init();
    });

    /* ===== Mulai ===== */
    state = 'start';
    init();
    loop();
})();
</script>
</body>
</html>
